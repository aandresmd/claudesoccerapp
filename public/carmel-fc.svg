<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Recreation of the Carmel FC badge for app theming -->
  <defs>
    <radialGradient id="band" cx="35%" cy="28%" r="90%">
      <stop offset="0%" stop-color="#3f7bd9"/>
      <stop offset="55%" stop-color="#1b4da8"/>
      <stop offset="100%" stop-color="#0f3470"/>
    </radialGradient>
    <radialGradient id="disc" cx="38%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#2e66c8"/>
      <stop offset="100%" stop-color="#16418f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9d423"/>
      <stop offset="100%" stop-color="#d4940a"/>
    </linearGradient>
    <clipPath id="discClip">
      <circle cx="100" cy="100" r="77.5"/>
    </clipPath>
  </defs>

  <circle cx="100" cy="100" r="98" fill="url(#band)" stroke="#fff" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="79" fill="url(#disc)" stroke="#fff" stroke-width="3"/>

  <g clip-path="url(#discClip)">
    <rect x="-20" y="86" width="240" height="28" fill="#fff" transform="rotate(-33 100 100)"/>
  </g>

  <path transform="translate(68,64) scale(1.05)"
        d="M0,-20 L4.7,-6.5 L19,-6.2 L7.6,2.5 L11.8,16.2 L0,8 L-11.8,16.2 L-7.6,2.5 L-19,-6.2 L-4.7,-6.5 Z"
        fill="url(#gold)" stroke="#b57e0a" stroke-width="1"/>

  <g transform="translate(137,136)">
    <circle r="17" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-dasharray="3.6 2.2"/>
    <text y="-3" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="6.5" fill="#fff" letter-spacing="0.5">EST.</text>
    <text y="9" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="bold" fill="#fff">1959</text>
  </g>

  <path id="arcTop" d="M 18,100 A 82,82 0 0 1 182,100" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="bold" fill="#fff" letter-spacing="4">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">CARMEL</textPath>
  </text>

  <path id="arcBottom" d="M 9,100 A 91,91 0 0 0 191,100" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="14.5" font-weight="bold" fill="#fff" letter-spacing="2.5">
    <textPath href="#arcBottom" startOffset="50%" text-anchor="middle">FOOTBALL CLUB</textPath>
  </text>
</svg>
